# ── Mirror & UI state scenarios ──────────────────────────────────────────────

- name: mirror_after_task
  category: llm
  instruction: "打开系统设置"
  timeout: 20
  verify:
    - logcat: "Task completed"
    - logcat: "keeping virtual display"
    - vd_exists: true
    - ui_element: "btn_view_operation"
    - ui_element: "btn_stop"
    - mirror: "系统设置页面全屏显示，无黑边"

- name: view_then_back
  category: llm
